<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Replica_</title>
  <style>
    @font-face { font-family:'Aeonik'; src:url('fonts/AeonikTRIAL-Regular.otf') format('opentype'); font-weight:400; }
    @font-face { font-family:'Aeonik'; src:url('fonts/AeonikTRIAL-Medium.otf') format('opentype'); font-weight:500; }
    @font-face { font-family:'Aeonik'; src:url('fonts/AeonikTRIAL-Bold.otf') format('opentype'); font-weight:700; }
    @font-face { font-family:'Aeonik Mono'; src:url('fonts/AeonikMonoTRIAL-Regular.otf') format('opentype'); font-weight:400; }
    @font-face { font-family:'Aeonik Mono'; src:url('fonts/AeonikMonoTRIAL-Medium.otf') format('opentype'); font-weight:500; }

    :root {
      /* new-style tokens */
      --neutral-50:   #F5F5F5;
      --neutral-300:  #C4C4C4;
      --neutral-700:  #404040;
      --neutral-950:  #0A0A0A;
      --color-white:  #FFFFFF;
      --color-metal:  #828782;
      --border:       #D4D4D4;
      --accent-amplify:   #1DFF5D;
      --accent-poison:    #5E1FFF;
      --accent-decontext: #FF5E1F;

      /* Semantic — UI feedback (not data state) */
      --color-error:      #B91C1C;
      --color-success:    #047857;
      --color-warning:    #B45309;
      --color-info:       #0369A1;

      --bg:       var(--neutral-300);
      --surface:  var(--neutral-50);
      --text:     var(--neutral-950);
      --text-mid: var(--color-metal);

      --radius-sm: 8px;
      --space-xs: 8px; --space-sm: 12px; --space-md: 16px; --space-lg: 24px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 375px; min-height: 480px; background: var(--bg); font-family: 'Aeonik', sans-serif; font-size: 14px; -webkit-font-smoothing: antialiased; color: var(--text); padding: var(--space-sm); }

    /* topnav (logo + tabs) */
    .topnav { display: flex; align-items: center; gap: 0; margin-bottom: var(--space-sm); }
    .topnav-logo {
      width: 32px; height: 32px;
      background: var(--neutral-950); color: var(--neutral-50);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Aeonik Mono', monospace; font-weight: 700; font-size: 14px;
    }
    .tab {
      --cut: 16px;
      height: 32px; padding: 0 18px;
      font-family: 'Aeonik Mono', monospace; font-size: 11px; text-transform: uppercase;
      background: var(--color-white); color: var(--neutral-950);
      clip-path: polygon(
        var(--cut) 0,
        100% 0,
        100% calc(100% - var(--cut)),
        calc(100% - var(--cut)) 100%,
        0 100%,
        0 var(--cut)
      );
      margin-left: calc(var(--cut) * -1);
      display: inline-flex; align-items: center;
    }
    .tab:first-of-type { margin-left: 0; }
    .tab.is-active {
      background: var(--neutral-950);
      color: var(--color-white);
      position: relative;
      z-index: 1;
    }
    .live { margin-left: auto; display: flex; align-items: center; gap: 5px; font-family: 'Aeonik Mono', monospace; font-size: 10px; letter-spacing: 0.04em; color: var(--text); text-transform: uppercase; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-amplify); animation: pulse 2.2s ease-in-out infinite; }
    .live-dot.alert { background: var(--accent-decontext); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* current profile hero (no card — webapp cp-hero style) */
    .cp-hero {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 2px 4px var(--space-sm);
    }
    .cp-eyebrow {
      font-family: 'Aeonik Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text);
    }
    .cp-sentence {
      font-family: 'Aeonik Mono', monospace;
      font-weight: 500;
      font-size: 14px;
      line-height: 1.35;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: var(--text);
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .cp-sentence > span { display: inline; }
    .cp-sentence .cp-voc {
      cursor: pointer;
      padding: 0 3px;
      overflow-wrap: anywhere;
      transition: background .12s, color .12s;
    }
    .cp-sentence .cp-voc:hover {
      background: var(--neutral-950);
      color: var(--color-white);
    }
    .cp-sentence .cp-voc:hover .cp-voc-word::before {
      content: attr(data-label) ": ";
    }
    @keyframes cp-dc-blink {
      0%, 50%      { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }
    .cp-sentence .cp-voc-dc {
      animation: cp-dc-blink 1.6s steps(1, end) infinite;
    }

    /* CATEGORIES — single card with row-per-cat (webapp ds-card style) */
    .ds-card {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: var(--space-md);
    }
    .cat-eyebrow {
      font-family: 'Aeonik Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text);
    }
    .cat-grid {
      display: flex;
      flex-direction: column;
      min-width: 0;
      margin-top: var(--space-sm);
    }
    .cat-card {
      background: transparent;
      border-radius: 0;
      padding: 10px 0;
      border-top: 1px solid var(--border);
      cursor: pointer;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      column-gap: var(--space-sm);
      row-gap: var(--space-xs);
      align-items: start;
      transition: opacity .1s;
    }
    .cat-card:first-child { border-top: none; padding-top: 0; }
    .cat-card:last-child { padding-bottom: 0; }
    .cat-card:active { opacity: 0.85; }
    .cat-card.nil { cursor: default; }
    .cat-card.nil .cat-title { color: var(--text-mid); }
    .cat-col { min-width: 0; }
    .cat-col-name   { grid-column: 1; grid-row: 1; }
    .cat-col-value  { grid-column: 1; grid-row: 2; }
    .cat-col-status { grid-column: 2; grid-row: 1 / span 2; align-self: center; }
    .cat-title {
      font-family: 'Aeonik Mono', monospace;
      font-weight: 500;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .cat-status {
      display: inline-flex;
      align-items: center;
      font-family: 'Aeonik Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      padding: 2px 10px;
      background: var(--neutral-950);
      color: var(--neutral-50);
    }
    .cat-status.dc  { background: var(--accent-decontext); color: #fff; }
    .cat-status.amp { background: var(--accent-amplify);   color: var(--neutral-950); }
    .cat-status.poi { background: var(--accent-poison);    color: #fff; }
    .cat-status.inactive {
      background: transparent;
      color: var(--neutral-700);
      border: 1px solid var(--neutral-700);
      padding: 1px 9px;
    }

    /* arduino panel */
    .ard-panel {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: var(--space-md);
      margin-top: var(--space-sm);
    }
    .ard-label { font-family: 'Aeonik Mono', monospace; font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text); margin-bottom: var(--space-xs); display: flex; align-items: center; gap: 6px; }
    .ard-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-mid); flex-shrink: 0; }
    .ard-dot.on  { background: var(--color-success); }
    .ard-dot.err { background: var(--color-error); }
    .ard-row { display: flex; gap: 6px; align-items: center; }
    .ard-input { flex: 1; font-family: 'Aeonik Mono', monospace; font-size: 11px; background: var(--bg); border: 1px solid var(--border); border-radius: 0; padding: 8px 10px; color: var(--text); outline: none; letter-spacing: 0.04em; }
    .ard-input::placeholder { color: var(--text-mid); }
    .ard-btn { font-family: 'Aeonik Mono', monospace; font-size: 11px; text-transform: uppercase; background: var(--neutral-950); color: var(--neutral-50); border: none; border-radius: 0; padding: 8px 13px; cursor: pointer; white-space: nowrap; transition: opacity .1s; }
    .ard-btn:active { opacity: 0.7; }
    .ard-btn.connected { background: var(--bg); color: var(--text-mid); border: 1px solid var(--border); }
    .ard-status { font-family: 'Aeonik Mono', monospace; font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; margin-top: 6px; min-height: 12px; }
    .ard-status.ok  { color: var(--color-success); }
    .ard-status.err { color: var(--color-error); }
    .ard-status.mid { color: var(--text-mid); }

    /* primary action button */
    .btn-primary {
      display: block;
      width: 100%;
      margin-top: var(--space-sm);
      background: var(--neutral-950);
      color: var(--neutral-50);
      font-family: 'Aeonik Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 14px 16px;
      border: none;
      border-radius: 0;
      cursor: pointer;
      transition: opacity .1s;
    }
    .btn-primary:hover  { opacity: 0.92; }
    .btn-primary:active { opacity: 0.82; }

    /* disruptive (destructive) — secondary outline variant */
    .btn-danger {
      display: block;
      width: 100%;
      margin-top: var(--space-sm);
      background: var(--color-white);
      color: var(--color-error);
      font-family: 'Aeonik Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 13px 16px; /* 1px less to compensate for the border */
      border: 1px solid var(--color-error);
      border-radius: 0;
      cursor: pointer;
      transition: background .12s, color .12s;
    }
    .btn-danger:hover  { background: var(--color-error); color: var(--color-white); }
    .btn-danger:active { background: #8A1414; border-color: #8A1414; color: var(--color-white); }
  </style>
</head>
<body>

  <div class="cp-hero">
    <div class="cp-eyebrow">CURRENT PROFILE</div>
    <div class="cp-sentence" id="sentenceEl">Loading...</div>
  </div>

  <div class="ds-card">
    <div class="cat-eyebrow">CATEGORIES</div>
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <div class="ard-panel">
    <div class="ard-label">
      <div class="ard-dot" id="ardDot"></div>
      PHYSICAL DEVICE
    </div>
    <div class="ard-row">
      <input class="ard-input" id="ardIp" type="text" placeholder="192.168.x.x" maxlength="15" spellcheck="false">
      <button class="ard-btn" id="ardBtn">Connect</button>
    </div>
    <div class="ard-status mid" id="ardStatus"></div>
  </div>

  <button class="btn-primary" id="btnDash">Open Dashboard</button>
  <button class="btn-danger"  id="btnReset">Reset</button>

  <script src="popup.js"></script>
</body>
</html>
